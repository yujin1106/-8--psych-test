<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>눈치사용경향성 검사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 16px}
.wrap{width:100%;max-width:520px}
.card{background:#fff;border-radius:16px;border:0.5px solid #e0e0e0;padding:28px 24px;margin-bottom:16px}
h1{font-size:18px;font-weight:500;color:#1a1a1a;margin-bottom:6px}
.sub{font-size:14px;color:#888;line-height:1.6}
.progress-bar{height:4px;background:#eee;border-radius:4px;margin:20px 0 4px;overflow:hidden}
.progress-fill{height:100%;background:#e8729a;border-radius:4px;transition:width 0.3s}
.prog-label{font-size:12px;color:#aaa;text-align:right;margin-bottom:20px}
.q-num{font-size:12px;color:#e8729a;font-weight:500;margin-bottom:8px}
.q-text{font-size:16px;color:#1a1a1a;line-height:1.65;margin-bottom:24px;min-height:56px}
.scale-wrap{display:flex;flex-direction:column;gap:10px}
.scale-labels{display:flex;justify-content:space-between;font-size:11px;color:#aaa;padding:0 2px}
.scale-btns{display:flex;gap:8px}
.scale-btn{flex:1;padding:12px 0;border:0.5px solid #ddd;border-radius:10px;background:#fff;font-size:15px;font-weight:500;color:#555;cursor:pointer;transition:all 0.15s}
.scale-btn:hover{border-color:#e8729a;color:#e8729a}
.scale-btn.active{background:#e8729a;border-color:#e8729a;color:#fff}
.nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.btn{padding:11px 20px;border-radius:10px;border:0.5px solid #ddd;background:#fff;font-size:14px;color:#555;cursor:pointer;transition:all 0.15s}
.btn-primary{background:#e8729a;border-color:#e8729a;color:#fff;flex:1}
.btn-primary:hover{background:#d4547e}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.result-badge{display:inline-block;font-size:12px;padding:4px 12px;border-radius:20px;background:#fde8f0;color:#d4547e;margin-bottom:18px}
.result-type{font-size:22px;font-weight:500;color:#1a1a1a}
.result-desc{font-size:14px;color:#555;line-height:1.75;margin-top:8px}
.divider{border-top:0.5px solid #f0e0e6;margin:20px 0}
.chart-section{margin-top:4px}
.chart-title{font-size:13px;font-weight:500;color:#c47a95;margin-bottom:10px}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.chart-label{font-size:12px;color:#c4a0b0;width:16px;text-align:right;flex-shrink:0}
.chart-track{flex:1;height:10px;background:#fce8f0;border-radius:6px;position:relative;overflow:visible}
.chart-fill{height:100%;border-radius:6px;transition:width 0.6s ease}
.chart-fill-odd{background:#e8729a}
.chart-fill-even{background:#f4a5c0}
.chart-score{font-size:12px;font-weight:500;min-width:32px}
.avg-marker{position:absolute;top:-4px;width:2px;height:18px;background:#c4a0b0;border-radius:1px;z-index:2}
.avg-label{position:absolute;top:-18px;font-size:10px;color:#c4a0b0;transform:translateX(-50%);white-space:nowrap}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#c4a0b0}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.feedback-box{background:#fff5f8;border-radius:10px;padding:16px;margin-top:16px}
.feedback-box p{font-size:13px;color:#555;line-height:1.75}
.restart-btn{width:100%;margin-top:20px;padding:13px;border-radius:10px;border:0.5px solid #ddd;background:#fff;font-size:14px;color:#555;cursor:pointer}
.restart-btn:hover{background:#f7f8fa}
.intro-list{font-size:13px;color:#666;line-height:2;margin-top:12px;padding-left:4px}
.start-btn{width:100%;margin-top:24px;padding:14px;border-radius:10px;background:#e8729a;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const questions = [
  {id:1,text:"나는 처음 만난 사람과 대화할 때, 상대의 말투나 표정을 통해 분위기를 파악하는 편이다.",scale:"odd"},
  {id:2,text:"나는 처음 만난 사람과 대화할 때, 분위기에 맞게 말투를 바꾼다.",scale:"even"},
  {id:3,text:"나는 친하지 않은 사람과 대화할 때, 상대의 반응 변화를 빠르게 알아차리는 편이다.",scale:"odd"},
  {id:4,text:"나는 친하지 않은 사람과 대화할 때, 상대의 반응에 맞게 표현 방식을 바꾼다.",scale:"even"},
  {id:5,text:"나는 대화 중 상대가 계속 말을 이어가려는 신호를 알아차리는 편이다.",scale:"odd"},
  {id:6,text:"나는 대화 중 상대가 말을 많이 할 때, 내가 말하는 양을 줄인다.",scale:"even"},
  {id:7,text:"나는 대화 상대가 달라져도, 상대의 반응 차이를 잘 느끼지 못하는 편이다.",scale:"odd",reverse:true},
  {id:8,text:"나는 대화 상대가 달라져도, 말하는 방식을 거의 바꾸지 않는다.",scale:"even",reverse:true},
  {id:9,text:"나는 대화 중 상대의 표정이 굳어질 때, 그 변화를 알아차리는 편이다.",scale:"odd"},
  {id:10,text:"나는 대화 중 상대의 표정이 굳어질 때, 말하는 내용을 바꾼다.",scale:"even"},
  {id:11,text:"나는 여러 사람이 함께 있는 자리에서, 전체적인 분위기를 빠르게 파악하는 편이다.",scale:"odd"},
  {id:12,text:"나는 여러 사람이 함께 있는 자리에서, 말하는 내용을 짧게 조절한다.",scale:"even"},
  {id:13,text:"나는 대화 중 상대의 반응이 줄어들 때, 그 변화를 알아차리는 편이다.",scale:"odd"},
  {id:14,text:"나는 대화 중 상대의 반응이 줄어들 때, 말하는 방식을 바꾼다.",scale:"even"},
];

const levels = {
  "민감성 눈치형":{emoji:"🥰",badge:"사회적 민감성 ↑ · 관계조절전략 ↑",desc:"당신은 타인의 감정과 분위기를 예민하게 읽으면서도, 그에 맞게 관계를 능숙하게 조절하는 눈치형입니다.",feedback:"주변 사람들의 감정 변화를 빠르게 알아채고, 상황에 맞는 말과 행동으로 관계를 부드럽게 이끌어가는 강점이 있습니다. 다만 과도한 배려가 자신의 감정을 억누르거나 소진으로 이어질 수 있으니, 때로는 자신의 필요도 표현하는 연습이 도움이 됩니다."},
  "과잉 인식형":{emoji:"😟",badge:"사회적 민감성 ↑ · 관계조절전략 ↓",desc:"당신은 타인의 감정을 예민하게 감지하지만, 그것을 행동으로 연결하는 데는 어려움을 느끼는 유형입니다.",feedback:"주변 사람의 감정과 분위기를 정확히 파악하는 능력이 뛰어납니다. 하지만 이를 어떻게 대응해야 할지 망설이거나, 지나친 눈치로 오히려 부담을 느낄 수 있습니다. 관찰한 신호에 부드럽게 반응하는 작은 시도를 늘려가면 도움이 됩니다."},
  "전략적 눈치형":{emoji:"😏",badge:"사회적 민감성 ↓ · 관계조절전략 ↑",desc:"당신은 감정 신호 감지보다는 실용적인 관계 조절에 더 집중하는 전략형입니다.",feedback:"상황의 흐름을 파악하고 관계를 조율하는 능력이 뛰어납니다. 단, 타인의 세밀한 감정 변화를 놓칠 수 있어 가끔 '눈치 없다'는 오해를 받을 수도 있습니다. 상대방의 비언어적 신호에 좀 더 주의를 기울이면 관계의 질이 한층 깊어질 수 있습니다."},
  "비눈치형":{emoji:"😑",badge:"사회적 민감성 ↓ · 관계조절전략 ↓",desc:"당신은 타인의 감정을 읽거나 관계를 전략적으로 조절하는 것보다 자신의 방식을 중시하는 유형입니다.",feedback:"솔직하고 원칙적인 태도로 자신의 생각을 분명히 표현하는 강점이 있습니다. 다만 상대가 불편함을 느낄 때 그 신호를 놓치거나, 관계에서 마찰이 생길 수 있습니다. 상대방의 표정이나 분위기에 조금 더 관심을 기울이는 연습이 관계 개선에 도움이 됩니다."}
};

let page='intro', answers={}, current=0;

function sc(val,rev){return rev?6-val:val;}

function calcResult(){
  let odd=0,even=0;
  questions.forEach(q=>{
    const s=sc(answers[q.id]||0,q.reverse);
    if(q.scale==='odd') odd+=s; else even+=s;
  });
  let type;
  if(odd>=28&&even>=26) type="민감성 눈치형";
  else if(odd>=28&&even<26) type="과잉 인식형";
  else if(odd<28&&even>=26) type="전략적 눈치형";
  else type="비눈치형";
  return {odd,even,type};
}

function render(){
  const app=document.getElementById('app');
  if(page==='intro') app.innerHTML=renderIntro();
  else if(page==='test') app.innerHTML=renderTest();
  else app.innerHTML=renderResult();
  bindEvents();
}

function renderIntro(){
  return `<div class="card">
    <h1>눈치사용경향성 검사</h1>
    <p class="sub" style="margin-top:8px">나는 어떤 눈치 유형일까요?<br>총 14문항 · 소요시간 약 3분</p>
    <div class="intro-list">
      ✦ 각 문항을 읽고 평소 자신과 얼마나 일치하는지<br>&nbsp;&nbsp;&nbsp;1(전혀 아니다) ~ 5(매우 그렇다)로 응답해 주세요.<br>
      ✦ 옳고 그른 답이 없으니 솔직하게 응답해 주세요.
    </div>
    <button class="start-btn" id="startBtn">검사 시작하기</button>
  </div>`;
}

function renderTest(){
  const q=questions[current];
  const pct=Math.round((current/questions.length)*100);
  return `<div class="card">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="prog-label">${current+1} / ${questions.length}</div>
    <div class="q-num">문항 ${q.id}</div>
    <div class="q-text">${q.text}</div>
    <div class="scale-wrap">
      <div class="scale-btns">
        ${[1,2,3,4,5].map(n=>`<button class="scale-btn ${answers[q.id]===n?'active':''}" data-val="${n}">${n}</button>`).join('')}
      </div>
      <div class="scale-labels"><span>전혀 아니다</span><span>매우 그렇다</span></div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn" ${current===0?'disabled':''}>이전</button>
      <button class="btn btn-primary" id="nextBtn" ${!answers[q.id]?'disabled':''}>
        ${current===questions.length-1?'결과 보기':'다음'}
      </button>
    </div>
  </div>`;
}

function renderResult(){
  const {odd,even,type}=calcResult();
  const lvl=levels[type];
  const oddPct=Math.round((odd/35)*100);
  const evenPct=Math.round((even/35)*100);
  const avgOddPct=Math.round((28/35)*100);
  const avgEvenPct=Math.round((26/35)*100);

  return `<div class="card">
    <div class="result-badge">${lvl.badge}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span style="font-size:48px;line-height:1">${lvl.emoji}</span>
      <div class="result-type">${type}</div>
    </div>
    <p class="result-desc">${lvl.desc}</p>

    <div class="divider"></div>

    <div class="chart-section">
      <div class="chart-title">사회적 민감성 (홀수 문항)</div>
      <div class="chart-row">
        <div class="chart-label">0</div>
        <div class="chart-track">
          <div class="chart-fill chart-fill-odd" style="width:${oddPct}%"></div>
          <div class="avg-marker" style="left:${avgOddPct}%"><span class="avg-label">평균</span></div>
        </div>
        <div class="chart-score" style="color:#e8729a">${odd}점</div>
        <div style="font-size:11px;color:#c4a0b0;width:20px;text-align:right">35</div>
      </div>

      <div class="chart-title">관계조절전략 (짝수 문항)</div>
      <div class="chart-row">
        <div class="chart-label">0</div>
        <div class="chart-track">
          <div class="chart-fill chart-fill-even" style="width:${evenPct}%"></div>
          <div class="avg-marker" style="left:${avgEvenPct}%"><span class="avg-label">평균</span></div>
        </div>
        <div class="chart-score" style="color:#f4a5c0">${even}점</div>
        <div style="font-size:11px;color:#c4a0b0;width:20px;text-align:right">35</div>
      </div>

      <div class="legend">
        <span class="leg-item"><span class="leg-dot" style="background:#e8729a"></span>사회적 민감성 (평균 28점)</span>
        <span class="leg-item"><span class="leg-dot" style="background:#f4a5c0"></span>관계조절전략 (평균 26점)</span>
      </div>
    </div>

    <div class="divider"></div>
    <div style="text-align:center;padding:8px 0 4px">
      <span style="font-size:13px;color:#c4a0b0">총점</span>
      <div style="font-size:28px;font-weight:500;color:#d4547e;margin-top:4px">${odd+even}<span style="font-size:14px;color:#c4a0b0;font-weight:400"> / 70점</span></div>
    </div>
    <div class="divider"></div>
    <div class="feedback-box">
      <p>${lvl.feedback}</p>
    </div>

    <button class="restart-btn" id="restartBtn">처음부터 다시 하기</button>
  </div>`;
}

function bindEvents(){
  const s=document.getElementById('startBtn');
  if(s) s.onclick=()=>{page='test';current=0;render();};

  document.querySelectorAll('.scale-btn').forEach(btn=>{
    btn.onclick=()=>{answers[questions[current].id]=parseInt(btn.dataset.val);render();};
  });

  const p=document.getElementById('prevBtn');
  if(p) p.onclick=()=>{if(current>0){current--;render();}};

  const n=document.getElementById('nextBtn');
  if(n) n.onclick=()=>{
    if(current<questions.length-1){current++;render();}
    else{page='result';render();}
  };

  const r=document.getElementById('restartBtn');
  if(r) r.onclick=()=>{answers={};current=0;page='intro';render();};
}

render();
</script>
</body>
</html>
